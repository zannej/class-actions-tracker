name: Run Scraper

on:
  schedule:
    - cron: '0 9 * * 0'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - run: pip install gspread google-auth-oauthlib google-auth-httplib2 requests beautifulsoup4
      
      - run: python scraper.py
